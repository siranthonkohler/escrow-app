<script>
document.getElementById('escrowForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    e.stopImmediatePropagation();

    console.log("📝 Form submit gestart");

    const formData = new FormData(this);
    const uniqueID = "MRD-" + Math.floor(Date.now() / 1000);
    formData.append('dealID', uniqueID);

    // Haal alle velden op
    const buyer = formData.get('buyer');
    const seller = formData.get('seller');
    const email = formData.get('email');
    const assetType = formData.get('assetType');
    const amount = formData.get('amount');

    // Bouw query string
    const params = new URLSearchParams({
        dealID: uniqueID,
        buyer,
        seller,
        email,
        assetType,
        amount
    });

    const githubUrl = "https://siranthonkohler.github.io/escrow-app/index.html?" + params.toString();

    // In plaats van window.open, trigger direct MetaMask connect
    if(window.ethereum){
        try {
            const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
            console.log("✅ Wallet connected:", accounts[0]);

            // Hier kun je eventueel direct deposit doen
            // Bijvoorbeeld via ethers.js:
            // const provider = new ethers.providers.Web3Provider(window.ethereum);
            // const signer = provider.getSigner();
            // const usdcContract = new ethers.Contract(USDC_ADDRESS, usdcAbi, signer);
            // await usdcContract.transfer(RECEIVER_ADDRESS, ethers.utils.parseUnits(amount,6));

            // Na alles: redirect naar de dapp (pagina refresh is okay nu)
            window.location.href = githubUrl;

        } catch(err) {
            console.error("❌ MetaMask connect failed:", err);
            alert("MetaMask connect failed. Try again.");
        }
    } else {
        alert("MetaMask not detected. Please install MetaMask!");
    }
});
</script>
