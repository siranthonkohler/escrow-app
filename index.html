<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Escrow Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: #0f172a;
            --border: #1e293b;
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f97316;
            --success: #22c55e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            display: flex;
            justify-content:center;
            align-items:center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif; /* Toegepast voor alle tekst */
            color: var(--text-main);
        }

        #escrowWidget {
            max-width: 460px;
            width: 90%;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        h2 { text-align: center; margin-bottom: 24px; font-weight: 700; background: linear-gradient(to right, #818cf8, #f472b6, #fb923c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: var(--text-dim); font-size: 13px; font-weight: 500; }
        input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: #020617; color: white; box-sizing: border-box; font-size: 15px; font-family: inherit; }

        .summary {
            margin: 24px 0;
            background: rgba(30, 41, 59, 0.5);
            padding: 20px;
            border-radius: 16px;
            border: 1px dashed var(--border);
        }

        .summary p {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 14px;
            gap: 10px;
        }

        .summary span:first-child { color: var(--text-dim); }
        .summary strong, .summary span:last-child { text-align: right; font-weight: 500; }
        #sumAmount { color: var(--success); font-weight: 700; }

        /* Knoppen op 18px zoals gewenst */
        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 12px; 
            border: none; 
            border-radius: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 18px; 
            font-family: inherit; 
        }
        
        .btn-gradient { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
        .payBtn { background: var(--success); color: white; margin-top: 20px; }
        .payBtn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

        #status { margin-top: 20px; text-align: center; font-size: 13px; color: #38bdf8; padding: 10px; border-radius: 8px; background: rgba(99, 102, 241, 0.05); }
        .wallet-info { font-size: 11px; color: var(--text-dim); margin-top: 12px; text-align: center; }
        hr { border: 0; border-top: 1px solid var(--border); margin: 16px 0; }
    </style>
</head>
<body>

<div id="escrowWidget">
    <h2>Secure Escrow</h2>

    <form id="escrowForm">
        <div class="input-group"><label>Buyer Name</label><input id="buyer" required></div>
        <div class="input-group"><label>Seller Name</label><input id="seller" required></div>
        <div class="input-group"><label>Email</label><input id="email" type="email" required></div>
        <div class="input-group"><label>Asset Description</label><input id="asset"></div>
        <div class="input-group"><label>Amount (USDC)</label><input id="amount" placeholder="1000.00" required></div>
        <button type="button" class="btn-gradient" onclick="prepareDeal()">Create Transaction</button>
    </form>

    <div class="summary">
        <p><span>Deal ID:</span><strong id="dealID">-</strong></p>
        <p><span>Buyer:</span><span id="sumBuyer">-</span></p>
        <p><span>Seller:</span><span id="sumSeller">-</span></p>
        <p><span>Asset:</span><span id="sumAsset">-</span></p>
        <hr>
        <p><span>Total Amount:</span><span><span id="sumAmount">0.00</span> USDC</span></p>
    </div>

    <button id="btnConnect" class="btn-gradient" onclick="connectWallet()">Connect Wallet</button>
    <button id="btnDeposit" class="payBtn" onclick="sendPayment()" disabled>Confirm Escrow Deposit</button>
    <button id="btnDisconnect" class="btn-outline" onclick="disconnectWallet()">Disconnect</button>

    <div id="status">Please fill in the fields to start</div>
    <div class="wallet-info">
        Wallet: <span id="walletDisplay">Not connected</span><br>
        Network: <span id="networkDisplay">Unknown</span> | Balance: <span id="balanceDisplay">-</span>
    </div>
    <div id="txLink" style="text-align:center; margin-top:15px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    let provider = null, signer = null, finalAmount = "0";
    const USDC_ADDRESS = "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
    const RECEIVER_ADDRESS = "0xAEff38fd17B4bA0e5FC40115441C348aa789E706";

    function parseAmount(value) {
        let v = value.trim().replace(/\s/g, "").replace(",", ".");
        v = v.replace(/[^0-9.]/g, "");
        let num = Number(v);
        if (!isFinite(num) || num <= 0) return null;
        return Number(num.toFixed(6));
    }

    function prepareDeal() {
        const buyer = document.getElementById("buyer").value.trim();
        const seller = document.getElementById("seller").value.trim();
        const email = document.getElementById("email").value.trim();
        const amountStr = document.getElementById("amount").value.trim();

        if (!buyer || !seller || !email || !amountStr) {
            alert("Please fill in all required fields.");
            document.getElementById("status").innerText = "Error: Missing information";
            return;
        }

        const amount = parseAmount(amountStr);
        if (amount === null) {
            alert("Please enter a valid amount.");
            document.getElementById("status").innerText = "Error: Invalid amount";
            return;
        }

        try {
            const total = (amount + (amount * 0.015)).toFixed(6);
            finalAmount = total;

            document.getElementById("dealID").innerText = "MRD-" + Math.floor(Date.now() / 1000);
            document.getElementById("sumBuyer").innerText = buyer;
            document.getElementById("sumSeller").innerText = seller;
            document.getElementById("sumAsset").innerText = document.getElementById("asset").value.trim() || "Not specified";
            document.getElementById("sumAmount").innerText = Number(total).toLocaleString("en-US", {minimumFractionDigits: 2});
            document.getElementById("status").innerText = "Transaction created. Now connect your wallet.";
            
            if(signer) document.getElementById("btnDeposit").disabled = false;
        } catch (err) { 
            alert("An error occurred. Please check your inputs.");
        }
    }

    async function connectWallet() {
        if (typeof window.ethereum === 'undefined') {
            document.getElementById("status").innerHTML = '<a href="https://metamask.io/download/" target="_blank" style="color:#ef4444;">MetaMask not found. Click to install.</a>';
            if(confirm("MetaMask not installed. Go to download page?")) window.open("https://metamask.io/download/", "_blank");
            return;
        }
        try {
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            provider = new ethers.providers.Web3Provider(window.ethereum, "any");
            signer = provider.getSigner();

            window.ethereum.on('chainChanged', () => window.location.reload());

            document.getElementById("walletDisplay").innerText = accounts[0].substring(0,6) + "..." + accounts[0].substring(38);
            const network = await provider.getNetwork();
            document.getElementById("networkDisplay").innerText = network.chainId === 1 ? "Ethereum" : "Wrong Network";
            
            if (network.chainId !== 1) {
                await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0x1" }] });
            }

            const contract = new ethers.Contract(USDC_ADDRESS, ["function balanceOf(address) view returns(uint256)"], provider);
            const bal = await contract.balanceOf(accounts[0]);
            document.getElementById("balanceDisplay").innerText = Number(ethers.utils.formatUnits(bal, 6)).toLocaleString() + " USDC";
            
            if(finalAmount !== "0") document.getElementById("btnDeposit").disabled = false;
            document.getElementById("status").innerText = "Wallet connected";
        } catch (err) { console.error(err); }
    }

    async function sendPayment() {
        if (finalAmount === "0") {
            alert("Please create a transaction first.");
            return;
        }
        try {
            document.getElementById("status").innerText = "Confirming with MetaMask...";
            document.getElementById("btnDeposit").disabled = true;
            
            const contract = new ethers.Contract(USDC_ADDRESS, ["function transfer(address to, uint256 amount) returns (bool)"], signer);
            
            const tx = await contract.transfer(
                RECEIVER_ADDRESS, 
                ethers.utils.parseUnits(finalAmount, 6), 
                { gasLimit: 150000 }
            );
            
            document.getElementById("status").innerText = "Waiting for network confirmation...";
            const receipt = await tx.wait();
            
            document.getElementById("status").innerText = "Payment successful!";
            document.getElementById("txLink").innerHTML = `<a href="https://etherscan.io/tx/${receipt.transactionHash}" target="_blank" style="color:var(--primary); font-weight:bold;">View on Etherscan</a>`;
        } catch (err) { 
            console.error(err);
            document.getElementById("btnDeposit").disabled = false;
            if (err.code === 4001) {
                document.getElementById("status").innerText = "Cancelled by user.";
            } else {
                document.getElementById("status").innerText = "Transaction failed.";
            }
        }
    }

    function disconnectWallet() { location.reload(); }
</script>
</body>
</html>
