<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrow Form - Start Transaction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #escrowFormApp {
            max-width: 480px;
            background: #0f172a;
            color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            margin: auto;
            width: 100%;
        }
        #escrowFormApp h2 {
            margin-top: 0;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        #escrowFormApp label { display: block; margin-top: 15px; font-weight: 500; color: #cbd5e1; }
        #escrowFormApp input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #020617;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        #escrowFormApp button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #6366f1;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        #escrowFormApp button:hover { background: #4f46e5; }
        #escrowFormApp button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div id="escrowFormApp">
        <h2>Start Your Escrow Transaction</h2>
        <form id="escrowForm">
            <label>Buyer Name</label>
            <input name="buyer" type="text" placeholder="John Smith" required>
            <label>Seller Name</label>
            <input name="seller" type="text" placeholder="LuxuryCars Ltd" required>
            <label>Email</label>
            <input name="email" type="email" placeholder="buyer@example.com" required>
            <label>Asset Description</label>
            <input name="assetType" type="text" placeholder="Luxury Car / Watch / etc." required>
            <label>Deposit Amount (USDC)</label>
            <input name="amount" type="number" placeholder="1000.00" step="0.01" required>
            <button type="submit">Initiate Escrow</button>
        </form>
    </div>

    <script>
        document.getElementById('escrowForm').addEventListener('submit', function(e) {
            e.preventDefault();
            e.stopImmediatePropagation();
            
            console.log("📝 Form submit gestart");
            
            const formData = new FormData(this);
            const uniqueID = "MRD-" + Math.floor(Date.now() / 1000);
            formData.append('dealID', uniqueID);

            const params = new URLSearchParams(formData);
            
            // LET OP: open deposit.html in plaats van index.html
            const depositUrl = "https://siranthonkohler.github.io/escrow-app/deposit.html?" + params.toString();
            
            console.log("🚀 Deposit URL:", depositUrl);
            
            // Nieuw tabblad openen zodat MetaMask kan triggeren
            window.open(depositUrl, "_blank");
        });
    </script>
</body>
</html>
