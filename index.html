<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Escrow Portal | MRDROWSE</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- CSS blijft hetzelfde -->
<style>
/* ... hier kan je je originele CSS behouden ... */
</style>

<!-- MultiWallet / Onboard.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/@web3-onboard/core@2.14.0/dist/web3-onboard.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@web3-onboard/injected-wallets@2.14.0/dist/injected-wallets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@web3-onboard/walletconnect@2.14.0/dist/walletconnect.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
<div class="page-container">
    <header class="main-header">
        <div class="brand-badge">Institutional Node</div>
        <h1 class="company-name">MRDROWSE</h1>
        <p class="hero-subtitle">Fill out the details to initiate a secure digital asset settlement. Powered by Ethereum smart contracts.</p>
    </header>

    <div id="escrowWidget">
        <h2>Secure Escrow</h2>
        <form id="escrowForm">
            <div class="input-group"><label>Buyer Name</label><input id="buyer" placeholder="Full Legal Name" required></div>
            <div class="input-group"><label>Seller Name</label><input id="seller" placeholder="Full Legal Name" required></div>
            <div class="input-group"><label>Email Address</label><input id="email" type="email" placeholder="name@company.com" required></div>
            <div class="input-group"><label>Asset Description</label><input id="asset" placeholder="e.g. Domain Name / Digital Art"></div>
            <div class="input-group"><label>Amount (USDC)</label><input id="amount" placeholder="0.00" required></div>
            <button type="button" class="btn-gradient" onclick="prepareDeal()">Generate Settlement</button>
        </form>

        <div class="summary">
            <p><span>Settlement ID:</span><strong id="dealID">-</strong></p>
            <p><span>Buyer:</span><span id="sumBuyer">-</span></p>
            <p><span>Seller:</span><span id="sumSeller">-</span></p>
            <p><span>Asset:</span><span id="sumAsset">-</span></p>
            <hr>
            <p><span>Total Payable:</span><span><span id="sumAmount">0.00</span> USDC</span></p>
        </div>

        <button id="btnConnect" class="btn-gradient" onclick="connectWallet()">Connect Wallet</button>
        <button id="btnDeposit" class="payBtn" onclick="sendPayment()" disabled>Execute Deposit</button>
        <button id="btnDisconnect" class="btn-outline" onclick="disconnectWallet()">Disconnect System</button>

        <div id="status">Ready for input</div>
        <div class="wallet-info">
            Gateway: <span id="walletDisplay">Not connected</span><br>
            Network: <span id="networkDisplay">-</span> | Balance: <span id="balanceDisplay">-</span>
        </div>
        <div id="txLink" style="text-align:center; margin-top:20px;"></div>
    </div>
</div>

<script>
let onboard, connectedWallet = null, provider = null, signer = null, finalAmount = "0";
const USDC_ADDRESS = "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
const RECEIVER_ADDRESS = "0xAEff38fd17B4bA0e5FC40115441C348aa789E706";

// 1️⃣ Setup MultiWallet Onboard.js
const injected = InjectedWallets();
const walletConnectModule = WalletConnectModule();

onboard = Onboard({
    wallets: [injected, walletConnectModule],
    chains: [
        {
            id: '0x1', 
            token: 'ETH',
            label: 'Ethereum Mainnet',
            rpcUrl: 'https://mainnet.infura.io/v3/YOUR_INFURA_KEY'
        }
    ]
});

// 2️⃣ Parse USDC amount
function parseAmount(value) {
    let v = value.trim().replace(/\s/g, "").replace(",", ".");
    v = v.replace(/[^0-9.]/g, "");
    let num = Number(v);
    if (!isFinite(num) || num <= 0) return null;
    return Number(num.toFixed(6));
}

// 3️⃣ Prepare deal
function prepareDeal() {
    const buyer = document.getElementById("buyer").value.trim();
    const seller = document.getElementById("seller").value.trim();
    const email = document.getElementById("email").value.trim();
    const amountStr = document.getElementById("amount").value.trim();

    if (!buyer || !seller || !email || !amountStr) {
        alert("Mandatory fields missing.");
        return;
    }

    const amount = parseAmount(amountStr);
    if (amount === null) { alert("Invalid USDC amount."); return; }

    const total = (amount + (amount * 0.015)).toFixed(6);
    finalAmount = total;

    document.getElementById("dealID").innerText = "MRD-" + Math.floor(Date.now() / 1000);
    document.getElementById("sumBuyer").innerText = buyer;
    document.getElementById("sumSeller").innerText = seller;
    document.getElementById("sumAsset").innerText = document.getElementById("asset").value.trim() || "Digital Asset";
    document.getElementById("sumAmount").innerText = Number(total).toLocaleString("en-US", {minimumFractionDigits: 2});
    document.getElementById("status").innerText = "Settlement ready. Please connect gateway.";

    if(signer) document.getElementById("btnDeposit").disabled = false;
}

// 4️⃣ Connect wallet via MultiWallet
async function connectWallet() {
    try {
        const wallets = await onboard.connectWallet();
        if (!wallets || wallets.length === 0) {
            document.getElementById("status").innerText = "Wallet connection cancelled.";
            return;
        }

        connectedWallet = wallets[0];
        provider = new ethers.providers.Web3Provider(connectedWallet.provider);
        signer = provider.getSigner();

        const accounts = connectedWallet.accounts;
        document.getElementById("walletDisplay").innerText = accounts[0].address.substring(0,6) + "..." + accounts[0].address.slice(-4);

        const network = await provider.getNetwork();
        document.getElementById("networkDisplay").innerText = network.chainId === 1 ? "Ethereum" : "Wrong Network";

        // USDC Balance
        const contract = new ethers.Contract(USDC_ADDRESS, ["function balanceOf(address) view returns(uint256)"], provider);
        const bal = await contract.balanceOf(accounts[0].address);
        document.getElementById("balanceDisplay").innerText = Number(ethers.utils.formatUnits(bal, 6)).toLocaleString() + " USDC";

        if(finalAmount !== "0") document.getElementById("btnDeposit").disabled = false;
        document.getElementById("status").innerText = "Secure gateway established.";
    } catch(e) {
        console.error(e);
        document.getElementById("status").innerText = "Access Denied.";
    }
}

// 5️⃣ Deposit USDC
async function sendPayment() {
    if(finalAmount === "0") return;
    try {
        document.getElementById("status").innerText = "Awaiting signature...";
        document.getElementById("btnDeposit").disabled = true;

        const contract = new ethers.Contract(USDC_ADDRESS, ["function transfer(address to, uint256 amount) returns (bool)"], signer);
        const tx = await contract.transfer(RECEIVER_ADDRESS, ethers.utils.parseUnits(finalAmount, 6), { gasLimit: 150000 });

        document.getElementById("status").innerText = "Synchronizing with blockchain...";
        const receipt = await tx.wait();

        document.getElementById("status").innerText = "Settlement successful.";
        document.getElementById("txLink").innerHTML = `<a href="https://etherscan.io/tx/${receipt.transactionHash}" target="_blank" style="color:var(--accent); font-weight:800;">[ VIEW ON ETHERSCAN ]</a>`;
    } catch(err) {
        console.error(err);
        document.getElementById("btnDeposit").disabled = false;
        document.getElementById("status").innerText = "Transaction terminated.";
    }
}

// 6️⃣ Disconnect wallet
async function disconnectWallet() {
    if (connectedWallet) await onboard.disconnectWallet({ label: connectedWallet.label });
    location.reload();
}
</script>
</body>
</html>
