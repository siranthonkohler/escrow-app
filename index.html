<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Form</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
.container{width:420px;background:#1e293b;padding:25px;border-radius:12px;}
input{width:100%;padding:10px;margin-top:8px;margin-bottom:12px;}
button{width:100%;padding:12px;background:#6366f1;color:white;border:none;border-radius:8px;font-weight:bold;}
</style>
</head>
<body>

<div class="container">
<h2>Start Escrow Transaction</h2>
<form id="escrowForm">
<label>Buyer</label><input name="buyer" required>
<label>Seller</label><input name="seller" required>
<label>Email</label><input name="email" type="email" required>
<label>Asset</label><input name="assetType" required>
<label>Amount USDC</label><input name="amount" type="number" step="0.01" required>
<button type="submit">Start Escrow</button>
</form>
</div>

<script>
document.getElementById("escrowForm").addEventListener("submit",function(e){
    e.preventDefault();
    const formData=new FormData(this);
    const dealID="MRD-"+Math.floor(Date.now()/1000); // uniek ID
    formData.append("dealID",dealID);
    const params=new URLSearchParams(formData);
    const url="deposit.html?"+params.toString(); // stuur door naar dApp
    window.location.href=url;
});
</script>

</body>
</html>
