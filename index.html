<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Widget</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.widget{
width:440px;
max-width:95%;
}

.card{
background:#0f172a;
padding:30px;
border-radius:20px;
border:1px solid #1e293b;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
color:white;
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
color:#cbd5e1;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:18px;
font-weight:600;
cursor:pointer;
}

.primary{background:#6366f1;color:white;}
.payBtn{background:#22c55e;color:white;}

.summaryBox{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.summaryBox p{
display:flex;
justify-content:space-between;
margin:6px 0;
}

</style>

</head>

<body>

<div class="widget">

<!-- FORM -->

<div id="formStep" class="card">

<h2>Start Escrow</h2>

<form id="escrowForm">

<label>Buyer</label> <input name="buyer" required>

<label>Seller</label> <input name="seller" required>

<label>Email</label> <input name="email" type="email" required>

<label>Asset</label> <input name="assetType" required>

<label>Amount (USDC)</label> <input name="amount" type="number" step="0.01" required>

<button class="primary">Initiate Escrow</button>

</form>

</div>

<!-- DEPOSIT -->

<div id="depositStep" class="card" style="display:none">

<h2>Escrow Deposit</h2>

<div class="summaryBox">
<p><span>Deal</span><strong id="dealID"></strong></p>
<p><span>Buyer</span><span id="buyer"></span></p>
<p><span>Seller</span><span id="seller"></span></p>
<p><span>Asset</span><span id="assetType"></span></p>
<p><span>Amount</span><strong id="amountDisplay"></strong></p>
</div>

<div class="summaryBox">
Wallet:<br>
<span id="wallet">Not connected</span>
</div>

<button id="btnMetaMask" class="primary" onclick="connectMetaMask()">
Connect MetaMask
</button>

<button id="btnPay" class="payBtn" onclick="sendPayment()" disabled>
Confirm Escrow Deposit
</button>

<div id="status">Connect wallet</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>

let provider, signer;

const USDC_ADDRESS="0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
const RECEIVER_ADDRESS="0xAEff38fd17B4bA0e5FC40115441C348aa789E706";

let finalTotalString="0";

function normalizeUSDC(value){

const cleaned=value.replace(",",".").replace(/[^0-9.]/g,"");

const num=parseFloat(cleaned);

if(isNaN(num)) throw new Error("Invalid amount");

return Number(num).toFixed(6);

}


/* FORM */

document.getElementById("escrowForm").addEventListener("submit",function(e){

e.preventDefault();

const formData=new FormData(this);

const uniqueID="MRD-"+Math.floor(Date.now()/1000);

formData.append("dealID",uniqueID);

const params=new URLSearchParams(formData);

/* SIMULATE URL */

history.pushState({},'',"?"+params.toString());

/* SHOW DAPP */

document.getElementById("formStep").style.display="none";
document.getElementById("depositStep").style.display="block";

loadDealData();

});


function loadDealData(){

const params=new URLSearchParams(window.location.search);

const rawAmount=params.get("amount")||"0";

const normalized=normalizeUSDC(rawAmount);

const numAmount=parseFloat(normalized);

const fee=Number((numAmount*0.015).toFixed(6));
const total=Number((numAmount+fee).toFixed(6));

finalTotalString=total.toFixed(6);

document.getElementById("dealID").innerText=params.get("dealID");
document.getElementById("buyer").innerText=params.get("buyer");
document.getElementById("seller").innerText=params.get("seller");
document.getElementById("assetType").innerText=params.get("assetType");

document.getElementById("amountDisplay").innerText=
numAmount.toLocaleString("en-US",{minimumFractionDigits:2})+" USDC";

}


/* WALLET */

async function connectMetaMask(){

const accounts=await window.ethereum.request({
method:"eth_requestAccounts"
});

provider=new ethers.providers.Web3Provider(window.ethereum);

signer=provider.getSigner();

document.getElementById("wallet").innerText=accounts[0];

document.getElementById("btnMetaMask").style.display="none";

document.getElementById("btnPay").disabled=false;

}


/* PAYMENT */

async function sendPayment(){

const usdcAbi=[
"function transfer(address to,uint256 amount) public returns(bool)"
];

const contract=new ethers.Contract(
USDC_ADDRESS,
usdcAbi,
signer
);

const value=ethers.utils.parseUnits(finalTotalString,6);

const tx=await contract.transfer(RECEIVER_ADDRESS,value);

document.getElementById("status").innerText="Processing...";

await tx.wait();

document.getElementById("status").innerText="Payment Successful";

}

</script>

</body>
</html>
