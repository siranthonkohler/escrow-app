<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Transaction Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    margin: 0;
}

#escrowWidget {
    max-width: 480px;
    width: 100%;
    background: #0f172a;
    color: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

h2 { text-align: center; font-weight: 600; margin-bottom: 20px; font-size: 24px; }

label {
    display: block;
    margin-top: 15px;
    font-weight: 500;
    color: #cbd5e1;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #020617;
    color: white;
    font-size: 14px;
    box-sizing: border-box;
}

input:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}

button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 20px;
}

.connectBtn { background: #6366f1; color: white; }
.connectBtn:hover { background: #4f46e5; }

.payBtn { background: #7c3aed; color: white; }
.payBtn:hover:not(:disabled) { background: #6b21a8; }
.payBtn:disabled { background: #1e293b; color: #94a3b8; cursor: not-allowed; border: 1px solid #334155; }

.summaryBox {
    background: #1e293b;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 15px;
    font-size: 14px;
    border: 1px solid #334155;
}

.summaryBox p {
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
}

.label { color: #94a3b8; }

#status {
    margin-top: 20px;
    font-size: 13px;
    text-align: center;
    color: #94a3b8;
}

.wallet-info {
    background: #0f172a;
    border: 1px dashed #334155;
    padding: 12px;
    border-radius: 12px;
    font-size: 12px;
    margin-bottom: 15px;
    word-break: break-all;
}

.hidden { display: none; }
</style>
</head>
<body>

<div id="escrowWidget">

<h2>Start Your Escrow Transaction</h2>

<form id="escrowForm">
    <label>Buyer Name</label>
    <input name="buyer" type="text" placeholder="John Smith" required>

    <label>Seller Name</label>
    <input name="seller" type="text" placeholder="LuxuryCars Ltd" required>

    <label>Email</label>
    <input name="email" type="email" placeholder="buyer@example.com" required>

    <label>Asset Description</label>
    <input name="assetType" type="text" placeholder="Luxury Car / Watch / etc." required>

    <label>Deposit Amount (USDC)</label>
    <input name="amount" type="number" placeholder="1000.00" step="0.01" required>

    <button type="submit">Initiate Escrow</button>
</form>

<div id="dappSection" class="hidden">

<div class="summaryBox">
<p><span class="label">Deal ID</span> <strong id="dealID">-</strong></p>
<p><span class="label">Buyer</span> <span id="buyerSummary">-</span></p>
<p><span class="label">Seller</span> <span id="sellerSummary">-</span></p>
<p><span class="label">Asset Type</span> <span id="assetTypeSummary">-</span></p>
<hr style="border:0;border-top:1px solid #334155;margin:15px 0;">
<p><span class="label">Amount</span> <span style="font-weight:bold; color:#7c3aed;"><span id="amountDisplay">0.00</span> USDC</span></p>
<div id="feeDisplay" style="font-size:12px;color:#94a3b8;text-align:right;">Includes 1.5% fee</div>
</div>

<div class="summaryBox wallet-info">
Connected Wallet:<br>
<span id="wallet">Not connected</span>
</div>

<button id="btnMetaMask" class="connectBtn">Connect MetaMask</button>
<button id="btnPay" class="payBtn" disabled>Confirm Escrow Deposit</button>
<div id="status">Please connect your wallet to proceed</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
let provider, signer;
const USDC_ADDRESS = "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
const RECEIVER_ADDRESS = "0xAEff38fd17B4bA0e5FC40115441C348aa789E706";
let finalTotalString = "0";

function normalizeUSDC(value){
    const cleaned = value.replace(",",".").replace(/[^0-9.]/g,"");
    const num = parseFloat(cleaned);
    if(isNaN(num) || num <= 0) throw new Error("Invalid amount");
    return Number(num).toFixed(6);
}

document.getElementById("escrowForm").addEventListener("submit", function(e){
    e.preventDefault();
    e.stopImmediatePropagation();

    const form = new FormData(this);
    const dealID = "MRD-" + Math.floor(Date.now()/1000);

    const buyer = form.get("buyer");
    const seller = form.get("seller");
    const assetType = form.get("assetType");
    const amountRaw = form.get("amount");

    let normalizedAmount;
    try { normalizedAmount = normalizeUSDC(amountRaw); }
    catch(err){ document.getElementById("status").innerText="Invalid amount"; return; }

    const numAmount = parseFloat(normalizedAmount);
    const fee = Number((numAmount*0.015).toFixed(6));
    const total = Number((numAmount+fee).toFixed(6));
    finalTotalString = total.toFixed(6);

    // update dApp section
    document.getElementById("dealID").innerText = dealID;
    document.getElementById("buyerSummary").innerText = buyer;
    document.getElementById("sellerSummary").innerText = seller;
    document.getElementById("assetTypeSummary").innerText = assetType;
    document.getElementById("amountDisplay").innerText = numAmount.toLocaleString("en-US",{minimumFractionDigits:2});
    document.getElementById("feeDisplay").innerText = `Fee (1.5%): ${fee.toFixed(2)} USDC | Total: ${total.toFixed(2)} USDC`;

    document.getElementById("dappSection").classList.remove("hidden");
    window.scrollTo(0,0);
});

document.getElementById("btnMetaMask").addEventListener("click", async function(){
    const status = document.getElementById("status");
    const btn = this;
    if(!window.ethereum){ status.innerText="MetaMask not detected"; return; }

    try{
        btn.innerText="Connecting...";
        const accounts = await window.ethereum.request({method:"eth_requestAccounts"});
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        document.getElementById("wallet").innerText = accounts[0];
        btn.style.display="none";
        document.getElementById("btnPay").disabled=false;
        status.innerText="Wallet connected";
    } catch(err){ status.innerText="Connection failed"; }
});

document.getElementById("btnPay").addEventListener("click", async function(){
    const btn = this;
    const status = document.getElementById("status");
    if(!signer){ status.innerText="Connect wallet first"; return; }

    try{
        btn.disabled = true;
        btn.innerText="Waiting for approval...";
        const usdcAbi = ["function transfer(address to,uint256 amount) public returns(bool)"];
        const contract = new ethers.Contract(USDC_ADDRESS, usdcAbi, signer);
        const value = ethers.utils.parseUnits(finalTotalString,6);
        const tx = await contract.transfer(RECEIVER_ADDRESS,value);
        status.innerText="Processing transaction...";
        await tx.wait();
        status.innerText="Payment Successful";
        btn.innerText="Paid";
    } catch(err){
        console.error(err);
        status.innerText="Transaction failed";
        btn.disabled=false;
        btn.innerText="Confirm Escrow Deposit";
    }
});
</script>
</body>
</html>
