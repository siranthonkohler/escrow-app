<script>
    let provider, signer;
    const USDC_ADDRESS = "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
    const RECEIVER_ADDRESS = "0xAEff38fd17B4bA0e5FC40115441C348aa789E706";
    let finalTotalString = "0";

    function getURLParams() {
        let params = new URLSearchParams(window.location.search);
        try {
            if (!params.has('amount') && window.parent !== window) {
                params = new URLSearchParams(window.parent.location.search);
            }
        } catch (e) {
            console.warn("Iframe restrictie: kan parent URL niet lezen. Gebruik directe URL params.");
        }
        return params;
    }

    function loadDealData(){
        const params = getURLParams();
        const rawAmount = (params.get("amount") || "0").replace(',', '.').replace(/[^0-9.]/g, '');
        const numAmount = parseFloat(rawAmount) || 0;
        const fee = numAmount * 0.015;
        const total = numAmount + fee;
        finalTotalString = total.toFixed(6);

        document.getElementById("dealID").innerText = params.get("dealID") || "N/A";
        document.getElementById("buyer").innerText = params.get("buyer") || "N/A";
        document.getElementById("seller").innerText = params.get("seller") || "N/A";
        document.getElementById("assetType").innerText = params.get("assetType") || "N/A";
        document.getElementById("amountDisplay").innerText = numAmount.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
        document.getElementById("feeDisplay").innerText = `Fee (1.5%): ${fee.toFixed(2)} USDC`;
    }

    window.addEventListener('load', loadDealData);

    async function connectMetaMask(){
        const status = document.getElementById("status");
        const btn = document.getElementById("btnMetaMask");
        
        // 1. Zoek de provider (direct of via parent)
        let eth = window.ethereum;
        if (!eth && window.parent && window.parent.ethereum) {
            eth = window.parent.ethereum;
        }

        if(!eth){
            status.innerText = "MetaMask not detected.";
            alert("Open deze pagina in een browser met MetaMask (zoals Chrome of Brave).");
            return;
        }

        try {
            btn.disabled = true;
            status.innerText = "Check MetaMask popup...";
            status.style.color = "#38bdf8";

            // 2. Vraag accounts op
            const accounts = await eth.request({ method: 'eth_requestAccounts' });
            
            if (accounts.length > 0) {
                provider = new ethers.providers.Web3Provider(eth);
                
                // 3. Controleer of we op Ethereum Mainnet zitten (Chain ID 1)
                const { chainId } = await provider.getNetwork();
                if (chainId !== 1) {
                    status.innerText = "Switch MetaMask to Ethereum Mainnet.";
                    status.style.color = "#fbbf24";
                    btn.disabled = false;
                    return;
                }

                signer = provider.getSigner();
                document.getElementById("wallet").innerText = accounts[0].slice(0,12)+"..."+accounts[0].slice(-10);
                btn.style.display = "none";
                document.getElementById("btnPay").disabled = false;
                
                status.innerText = "Wallet connected!";
                status.style.color = "#22c55e";
            }
        } catch(err) {
            console.error("Connection Error:", err);
            btn.disabled = false;
            if (err.code === -32002) {
                status.innerText = "Request already pending in MetaMask.";
            } else {
                status.innerText = "Connection failed. Try again.";
            }
            status.style.color = "#ef4444";
        }
    }

    async function sendPayment(){
        const btn = document.getElementById("btnPay");
        const status = document.getElementById("status");
        
        if(!signer || finalTotalString === "0") return;

        try {
            btn.disabled = true;
            btn.innerText = "Confirming...";
            
            const usdcAbi = ["function transfer(address to, uint256 amount) public returns (bool)"];
            const contract = new ethers.Contract(USDC_ADDRESS, usdcAbi, signer);
            const value = ethers.utils.parseUnits(finalTotalString, 6);
            
            const tx = await contract.transfer(RECEIVER_ADDRESS, value);
            
            status.innerText = "Transaction pending...";
            status.style.color = "#38bdf8";
            
            await tx.wait();
            
            status.innerText = "Payment Secured Successfully!";
            status.style.color = "#22c55e";
            btn.innerText = "Verified ✔";
        } catch(e) {
            console.error("Payment Error:", e);
            btn.disabled = false;
            btn.innerText = "Send Escrow Deposit";
            status.innerText = e.message.includes("user rejected") ? "Transaction cancelled." : "Transaction failed.";
            status.style.color = "#ef4444";
        }
    }
</script>
