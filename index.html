<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Transaction</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#020617;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
font-family:'Inter',sans-serif;
}

#escrowWidget{
max-width:480px;
width:100%;
background:#0f172a;
color:white;
padding:30px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
border:1px solid #1e293b;
}

h2{text-align:center;margin-bottom:20px;}

label{display:block;margin-top:12px;color:#cbd5e1;font-size:14px;}

input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:white;
box-sizing:border-box;
}

.summary{
margin-top:18px;
background:#1e293b;
padding:14px;
border-radius:12px;
border:1px solid #334155;
font-size:14px;
}

.summary p{
display:flex;
justify-content:space-between;
margin:8px 0;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-weight:600;
font-size:16px;
cursor:pointer;
}

.connectBtn{background:#6366f1;color:white;}
.disconnectBtn{background:#ef4444;color:white;}
.payBtn{background:#22c55e;color:white;}

.payBtn:disabled{
background:#1e293b;
color:#475569;
border:1px solid #334155;
cursor:not-allowed;
}

#status{
margin-top:14px;
text-align:center;
font-size:13px;
color:#38bdf8;
}

.small{
font-size:12px;
color:#94a3b8;
}

</style>

</head>

<body>

<div id="escrowWidget">

<h2>Escrow Transaction</h2>

<form id="escrowForm">

<label>Buyer Name</label>
<input id="buyer" required>

<label>Seller Name</label>
<input id="seller" required>

<label>Email</label>
<input id="email" type="email" required>

<label>Asset Description</label>
<input id="asset">

<label>Deposit Amount (USDC)</label>
<input id="amount" placeholder="1000.00" required>

<button type="button" class="connectBtn" onclick="prepareDeal()">
Initiate Escrow
</button>

</form>

<div class="summary">

<p><span>Deal ID</span><strong id="dealID">-</strong></p>
<p><span>Buyer</span><span id="sumBuyer">-</span></p>
<p><span>Seller</span><span id="sumSeller">-</span></p>
<p><span>Asset</span><span id="sumAsset">-</span></p>

<hr style="border:0;border-top:1px solid #334155;margin:12px 0;">

<p>
<span>Total</span>
<span style="color:#22c55e;font-weight:bold;">
<span id="sumAmount">0.00</span> USDC
</span>
</p>

<p class="small">Includes 1.5% fee</p>

<p class="small">
Wallet: <span id="walletDisplay">Not connected</span>
</p>

<p class="small">
Network: <span id="networkDisplay">Unknown</span>
</p>

<p class="small">
USDC Balance: <span id="balanceDisplay">-</span>
</p>

</div>

<button id="btnConnect" class="connectBtn" onclick="connectWallet()">
Connect Wallet
</button>

<button id="btnDisconnect" class="disconnectBtn" onclick="disconnectWallet()">
Disconnect Wallet
</button>

<button id="btnDeposit" class="payBtn" onclick="sendPayment()" disabled>
Confirm Escrow Deposit
</button>

<div id="status">
Fill the form to start escrow
</div>

<div id="txLink" style="text-align:center;margin-top:10px;"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>

let provider=null;
let signer=null;

let finalAmount="0";
let dealHash="";

const USDC_ADDRESS="0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
const RECEIVER_ADDRESS="0xAEff38fd17B4bA0e5FC40115441C348aa789E706";

function parseAmount(value){

let v=value.trim().replace(/\s/g,"");

const comma=v.lastIndexOf(",");
const dot=v.lastIndexOf(".");

if(comma>-1 && dot>-1){

if(comma>dot){
v=v.replace(/\./g,"").replace(",",".");
}else{
v=v.replace(/,/g,"");
}

}else if(comma>-1){
v=v.replace(",",".");
}

v=v.replace(/[^0-9.]/g,"");

let num=Number(v);

if(!isFinite(num) || num<=0){
throw new Error("Invalid amount");
}

return Number(num.toFixed(6));

}

function createHash(str){

return ethers.utils.keccak256(
ethers.utils.toUtf8Bytes(str)
);

}

function prepareDeal(){

try{

const buyer=document.getElementById("buyer").value.trim();
const seller=document.getElementById("seller").value.trim();
const asset=document.getElementById("asset").value.trim();

const amount=parseAmount(
document.getElementById("amount").value
);

const fee=Number((amount*0.015).toFixed(6));
const total=Number((amount+fee).toFixed(6));

finalAmount=total.toFixed(6);

const deal="MRD-"+Math.floor(Date.now()/1000);

dealHash=createHash(
buyer+seller+asset+finalAmount
);

document.getElementById("dealID").innerText=deal;
document.getElementById("sumBuyer").innerText=buyer;
document.getElementById("sumSeller").innerText=seller;
document.getElementById("sumAsset").innerText=asset;

document.getElementById("sumAmount").innerText=
total.toLocaleString("en-US",{minimumFractionDigits:2});

document.getElementById("status").innerText=
"Escrow prepared. Connect wallet.";

}catch(err){

alert(err.message);

}

}

async function connectWallet(){

if(!window.ethereum){

if(confirm("MetaMask is not installed.\n\nInstall MetaMask to continue with the escrow transaction.\n\nClick OK to install.")){
window.open("https://metamask.io/download/","_blank");
}

return;

}

try{

const accounts=await ethereum.request({
method:"eth_requestAccounts"
});

provider=new ethers.providers.Web3Provider(window.ethereum);
signer=provider.getSigner();

const address=accounts[0];

document.getElementById("walletDisplay").innerText=
address;

const network=await provider.getNetwork();

document.getElementById("networkDisplay").innerText=
network.chainId===1 ? "Ethereum Mainnet" : "Wrong Network";

if(network.chainId!==1){

await ethereum.request({
method:"wallet_switchEthereumChain",
params:[{chainId:"0x1"}]
});

provider=new ethers.providers.Web3Provider(window.ethereum);
signer=provider.getSigner();

document.getElementById("networkDisplay").innerText=
"Ethereum Mainnet";

}

const abi=["function balanceOf(address) view returns(uint256)"];

const contract=new ethers.Contract(
USDC_ADDRESS,
abi,
provider
);

const bal=await contract.balanceOf(address);

const formatted=
Number(
ethers.utils.formatUnits(bal,6)
).toLocaleString("en-US",{minimumFractionDigits:2});

document.getElementById("balanceDisplay").innerText=
formatted+" USDC";

document.getElementById("btnDeposit").disabled=false;

document.getElementById("status").innerText=
"Wallet connected";

}catch(err){

console.error(err);

alert("Wallet connection failed");

}

}

function disconnectWallet(){

provider=null;
signer=null;

document.getElementById("walletDisplay").innerText="Not connected";
document.getElementById("networkDisplay").innerText="Unknown";
document.getElementById("balanceDisplay").innerText="-";

document.getElementById("btnDeposit").disabled=true;

document.getElementById("status").innerText=
"Wallet disconnected";

}

async function sendPayment(){

if(!signer){
alert("Connect wallet first");
return;
}

try{

const abi=[
"function transfer(address to,uint256 amount) returns(bool)"
];

const contract=new ethers.Contract(
USDC_ADDRESS,
abi,
signer
);

const value=
ethers.utils.parseUnits(finalAmount,6);

const tx=await contract.transfer(
RECEIVER_ADDRESS,
value,
{
gasLimit:120000
}
);

document.getElementById("status").innerText=
"Waiting for confirmation...";

const receipt=await tx.wait();

document.getElementById("status").innerText=
"Escrow deposit successful";

document.getElementById("btnDeposit").innerText="Paid ✔";

const link=
"https://etherscan.io/tx/"+receipt.transactionHash;

document.getElementById("txLink").innerHTML=
'<a href="'+link+'" target="_blank" style="color:#38bdf8">View transaction on Etherscan</a>';

}catch(err){

console.error(err);

document.getElementById("status").innerText=
"Transaction failed or rejected";

}

}

</script>

</body>
</html>
