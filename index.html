<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Single Widget</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body { background-color: #020617; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
#escrowWidget { max-width: 480px; width: 100%; background: #0f172a; color: white; padding: 30px; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
h2 { text-align: center; margin-bottom: 20px; font-weight: 600; font-size: 24px; }
label { display: block; margin-top: 15px; font-weight: 500; color: #cbd5e1; }
input { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; font-size: 14px; box-sizing: border-box; }
input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
input[readonly] { background: #1e293b; color: #94a3b8; }
button { margin-top: 20px; width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
button:hover { opacity: 0.9; }
button:disabled { background: #64748b; cursor: not-allowed; opacity: 0.6; }
.connectBtn { background: #6366f1; color: white; }
.payBtn { background: #22c55e; color: white; }
.payBtn:hover:not(:disabled) { background: #16a34a; }
.payBtn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; border: 1px solid #334155; }
.summaryBox { background: #1e293b; padding: 18px; border-radius: 14px; margin-top: 20px; font-size: 14px; border: 1px solid #334155; }
.summaryBox p { margin: 10px 0; display: flex; justify-content: space-between; }
.label { color: #94a3b8; }
#status { margin-top: 15px; font-size: 13px; text-align: center; color: #38bdf8; }
.wallet-info { background: #020617; border: 1px dashed #334155; padding: 12px; border-radius: 12px; margin-top: 15px; font-size: 12px; }
</style>
</head>
<body>

<div id="escrowWidget">

<h2>Escrow Transaction</h2>

<form id="escrowForm">
<label>Buyer Name</label>
<input name="buyer" type="text" placeholder="John Smith" required>

<label>Seller Name</label>
<input name="seller" type="text" placeholder="LuxuryCars Ltd" required>

<label>Email</label>
<input name="email" type="email" placeholder="buyer@example.com" required>

<label>Asset Description</label>
<input name="assetType" type="text" placeholder="Luxury Car / Watch / etc." required>

<label>Deposit Amount (USDC)</label>
<input name="amount" type="number" placeholder="1000.00" step="0.01" required>

<button type="submit" id="submitBtn">Initiate Escrow</button>
</form>

<div class="summaryBox" id="summaryBox">
<p><span class="label">Deal ID</span> <strong id="dealID">-</strong></p>
<p><span class="label">Buyer</span> <span id="buyerSummary">-</span></p>
<p><span class="label">Seller</span> <span id="sellerSummary">-</span></p>
<p><span class="label">Asset Type</span> <span id="assetTypeSummary">-</span></p>
<hr style="border:0;border-top:1px solid #334155;margin:15px 0;">
<p><span class="label">Amount</span><span style="font-size:18px;color:#22c55e;font-weight:bold;"><span id="amountDisplay">0.00</span> USDC</span></p>
<div id="feeDisplay" style="font-size:11px;color:#94a3b8;text-align:right;">Includes 1.5% fee</div>
<div class="wallet-info">
<small style="color:#94a3b8">Connected Wallet</small><br>
<span id="wallet" style="font-family:monospace;font-size:11px;">Not connected</span>
</div>

<button id="btnPay" class="payBtn" disabled>Confirm Escrow Deposit</button>
<div id="status">Fill form to start escrow</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
let provider, signer;
const USDC_ADDRESS = "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
const RECEIVER_ADDRESS = "0xAEff38fd17B4bA0e5FC40115441C348aa789E706";
let finalTotalString = "0";

// Form submit → connect wallet & vul summary
document.getElementById('escrowForm').addEventListener('submit', async function(e){
    e.preventDefault();

    // --- INITIATE WALLET CONNECT DIRECTLY IN CLICK ---
    if(!window.ethereum){ alert("MetaMask not detected"); return; }
    try{
        // Geldige gesture voor MetaMask
        const accounts = await ethereum.request({ method:'eth_requestAccounts' });
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        document.getElementById('wallet').innerText = accounts[0];
        document.getElementById('status').innerText = "✅ Wallet connected";
        document.getElementById('status').style.color = "#22c55e";

    }catch(err){
        console.error(err);
        document.getElementById('status').innerText = "❌ MetaMask connection failed";
        document.getElementById('status').style.color = "#ef4444";
        return;
    }

    // --- VUL SUMMARY ---
    const fd = new FormData(this);
    const uniqueID = "MRD-" + Math.floor(Date.now()/1000);
    const buyer = fd.get('buyer');
    const seller = fd.get('seller');
    const assetType = fd.get('assetType');
    const amount = parseFloat(fd.get('amount'));
    if(amount <= 0){ alert("Invalid amount"); return; }
    const fee = +(amount*0.015).toFixed(2);
    const total = +(amount+fee).toFixed(2);
    finalTotalString = total.toString();

    document.getElementById('dealID').innerText = uniqueID;
    document.getElementById('buyerSummary').innerText = buyer;
    document.getElementById('sellerSummary').innerText = seller;
    document.getElementById('assetTypeSummary').innerText = assetType;
    document.getElementById('amountDisplay').innerText = amount.toFixed(2);
    document.getElementById('feeDisplay').innerText = `Fee (1.5%): ${fee.toFixed(2)} USDC | Total: ${total.toFixed(2)} USDC`;

    // Zet form read-only
    Array.from(this.elements).forEach(el=>el.readOnly=true);
    document.getElementById('submitBtn').disabled=true;

    // Activate pay button
    document.getElementById('btnPay').disabled = false;
});

// Pay button → USDC transfer
document.getElementById('btnPay').addEventListener('click', async function(){
    if(!signer){ alert("Connect wallet first"); return; }
    const btn = this;
    const status = document.getElementById('status');
    try{
        btn.disabled = true;
        btn.innerText = "Waiting for approval...";
        const usdcAbi = ["function transfer(address to,uint256 amount) public returns(bool)"];
        const contract = new ethers.Contract(USDC_ADDRESS, usdcAbi, signer);
        const value = ethers.utils.parseUnits(finalTotalString,6);
        const tx = await contract.transfer(RECEIVER_ADDRESS,value);
        status.innerText = "⏳ Processing transaction";
        await tx.wait();
        status.innerText = "✅ Payment Successful";
        status.style.color = "#22c55e";
        btn.innerText = "Paid ✔";
    }catch(e){
        console.error(e);
        btn.disabled = false;
        btn.innerText = "Confirm Escrow Deposit";
        status.innerText = "❌ Transaction failed";
        status.style.color = "#ef4444";
    }
});
</script>
</body>
</html>
