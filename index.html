<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Application</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* FORM */

#escrowFormApp{
max-width:480px;
background:#0f172a;
color:white;
padding:30px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
width:100%;
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
color:#cbd5e1;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:white;
}

button{
margin-top:25px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#6366f1;
color:white;
font-weight:600;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

/* DEPOSIT */

#escrowDepositApp{
display:none;
max-width:440px;
width:100%;
background:#0f172a;
color:white;
padding:30px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
border:1px solid #1e293b;
}

.summaryBox{
background:#1e293b;
padding:18px;
border-radius:14px;
margin-bottom:15px;
font-size:14px;
border:1px solid #334155;
}

.summaryBox p{
margin:10px 0;
display:flex;
justify-content:space-between;
}

.label{color:#94a3b8;}

.connectBtn{background:#6366f1;}
.payBtn{background:#22c55e;}

.payBtn:disabled{
background:#1e293b;
color:#475569;
cursor:not-allowed;
border:1px solid #334155;
}

.wallet-info{
background:#020617;
border:1px dashed #334155;
}

#status{
margin-top:20px;
font-size:13px;
text-align:center;
color:#38bdf8;
}

</style>

</head>

<body>

<!-- FORM -->

<div id="escrowFormApp">

<h2>Start Your Escrow Transaction</h2>

<form id="escrowForm">

<label>Buyer Name</label> <input name="buyer" type="text" required>

<label>Seller Name</label> <input name="seller" type="text" required>

<label>Email</label> <input name="email" type="email" required>

<label>Asset Description</label> <input name="assetType" type="text" required>

<label>Deposit Amount (USDC)</label> <input name="amount" type="number" step="0.01" required>

<button type="submit">Initiate Escrow</button>

</form>

</div>

<!-- DEPOSIT APP -->

<div id="escrowDepositApp">

<h2>Escrow Deposit (USDC)</h2>

<div class="summaryBox">

<p><span class="label">Deal ID</span> <strong id="dealID"></strong></p>
<p><span class="label">Buyer</span> <span id="buyer"></span></p>
<p><span class="label">Seller</span> <span id="seller"></span></p>
<p><span class="label">Asset Type</span> <span id="assetType"></span></p>

<hr style="border:0;border-top:1px solid #334155;margin:15px 0;">

<p>
<span class="label">Amount</span>
<span style="font-size:18px;color:#22c55e;font-weight:bold;">
<span id="amountDisplay"></span> USDC
</span>
</p>

<div id="feeDisplay" style="font-size:11px;color:#94a3b8;text-align:right;"></div>

</div>

<div class="summaryBox wallet-info">

<small style="color:#94a3b8">Connected Wallet</small><br>

<span id="wallet" style="font-family:monospace;font-size:11px;">
Not connected
</span>

</div>

<button id="btnMetaMask" class="connectBtn">
Connect MetaMask
</button>

<button id="btnPay" class="payBtn" disabled>
Confirm Escrow Deposit
</button>

<div id="status">
Please connect your wallet to proceed
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>

let provider, signer;
let finalTotalString="0";

const USDC_ADDRESS="0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
const RECEIVER_ADDRESS="0xAEff38fd17B4bA0e5FC40115441C348aa789E706";

function normalizeUSDC(value){
const cleaned=value.replace(",",".").replace(/[^0-9.]/g,"");
const num=parseFloat(cleaned);
if(isNaN(num)) throw new Error("Invalid amount");
return Number(num).toFixed(6);
}

/* FORM SUBMIT */

document.getElementById("escrowForm").addEventListener("submit",function(e){

e.preventDefault();

const formData=new FormData(this);

const uniqueID="MRD-"+Math.floor(Date.now()/1000);
formData.append("dealID",uniqueID);

const buyer=formData.get("buyer");
const seller=formData.get("seller");
const assetType=formData.get("assetType");
const rawAmount=formData.get("amount");

document.getElementById("escrowFormApp").style.display="none";
document.getElementById("escrowDepositApp").style.display="block";

const normalized=normalizeUSDC(rawAmount);
const numAmount=parseFloat(normalized);

const fee=Number((numAmount*0.015).toFixed(6));
const total=Number((numAmount+fee).toFixed(6));

finalTotalString=total.toFixed(6);

document.getElementById("dealID").innerText=uniqueID;
document.getElementById("buyer").innerText=buyer;
document.getElementById("seller").innerText=seller;
document.getElementById("assetType").innerText=assetType;

document.getElementById("amountDisplay").innerText=
numAmount.toLocaleString("en-US",{minimumFractionDigits:2});

document.getElementById("feeDisplay").innerText=
`Fee (1.5%): ${fee.toFixed(2)} USDC | Total: ${total.toFixed(2)} USDC`;

});


/* METAMASK */

document.getElementById("btnMetaMask").onclick=async function(){

if(!window.ethereum){
alert("MetaMask not detected");
return;
}

const accounts=await window.ethereum.request({method:"eth_requestAccounts"});

provider=new ethers.providers.Web3Provider(window.ethereum);
signer=provider.getSigner();

document.getElementById("wallet").innerText=accounts[0];

this.style.display="none";
document.getElementById("btnPay").disabled=false;

};


/* PAYMENT */

document.getElementById("btnPay").onclick=async function(){

const status=document.getElementById("status");

const contract=new ethers.Contract(
USDC_ADDRESS,
["function transfer(address to,uint256 amount) public returns(bool)"],
signer
);

const value=ethers.utils.parseUnits(finalTotalString,6);

const tx=await contract.transfer(RECEIVER_ADDRESS,value);

status.innerText="⏳ Processing transaction";

await tx.wait();

status.innerText="✅ Payment Successful";

};

</script>

</body>
</html>
