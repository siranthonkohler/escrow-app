<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Widget - All-in-One</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
  color: white;
}

#escrowWidget {
  background: #0f172a;
  max-width: 480px;
  width: 100%;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 600;
  font-size: 24px;
}

label {
  display: block;
  margin-top: 15px;
  font-weight: 500;
  color: #cbd5e1;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #020617;
  color: white;
  font-size: 14px;
}

input:focus {
  outline: none;
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover { opacity: 0.9; }

.connectBtn { background: #f59e0b; color: white; }
.payBtn { background: #22c55e; color: white; }

.payBtn:disabled {
  background: #1e293b;
  color: #475569;
  cursor: not-allowed;
  border: 1px solid #334155;
}

.summaryBox {
  background: #1e293b;
  padding: 18px;
  border-radius: 14px;
  margin-top: 20px;
  border: 1px solid #334155;
  font-size: 14px;
}

.summaryBox p {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.label { color: #94a3b8; }

#status {
  margin-top: 15px;
  text-align: center;
  font-size: 13px;
  color: #38bdf8;
}
</style>
</head>
<body>

<div id="escrowWidget">
<h2>Escrow Transaction</h2>

<form id="escrowForm">
  <label>Buyer Name</label>
  <input name="buyer" type="text" placeholder="John Smith" required>

  <label>Seller Name</label>
  <input name="seller" type="text" placeholder="LuxuryCars Ltd" required>

  <label>Email</label>
  <input name="email" type="email" placeholder="buyer@example.com" required>

  <label>Asset Description</label>
  <input name="assetType" type="text" placeholder="Luxury Car / Watch / etc." required>

  <label>Deposit Amount (USDC)</label>
  <input name="amount" type="number" placeholder="1000.00" step="0.01" required>

  <button type="submit">Start Escrow</button>
</form>

<div class="summaryBox" id="summary" style="display:none;">
  <p><span class="label">Deal ID</span> <span id="dealID">-</span></p>
  <p><span class="label">Buyer</span> <span id="buyerDisplay">-</span></p>
  <p><span class="label">Seller</span> <span id="sellerDisplay">-</span></p>
  <p><span class="label">Asset</span> <span id="assetDisplay">-</span></p>
  <hr>
  <p><span class="label">Amount</span> <span id="amountDisplay">0.00 USDC</span></p>
  <p id="feeDisplay" style="font-size:12px;color:#94a3b8;">Includes 1.5% fee</p>
</div>

<button id="btnMetaMask" class="connectBtn" style="display:none;" onclick="connectMetaMask()">Connect MetaMask</button>
<button id="btnPay" class="payBtn" style="display:none;" onclick="sendPayment()" disabled>Confirm Escrow Deposit</button>

<div id="status">Fill the form to begin</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
let provider, signer;
const USDC_ADDRESS = "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
const RECEIVER_ADDRESS = "0xAEff38fd17B4bA0e5FC40115441C348aa789E706";
let finalTotalString = "0";

function normalizeUSDC(value){
  const num = parseFloat(value.toString().replace(",","."));
  if(isNaN(num)) throw new Error("Invalid amount");
  return Number(num).toFixed(6);
}

document.getElementById('escrowForm').addEventListener('submit', function(e){
  e.preventDefault();
  const formData = new FormData(this);
  const uniqueID = "MRD-" + Math.floor(Date.now() / 1000);

  const buyer = formData.get("buyer");
  const seller = formData.get("seller");
  const email = formData.get("email");
  const assetType = formData.get("assetType");
  const amount = parseFloat(formData.get("amount"));

  if(amount <= 0) return alert("Enter a valid amount");

  const fee = amount * 0.015;
  const total = amount + fee;
  finalTotalString = total.toFixed(6);

  // update summary
  document.getElementById("dealID").innerText = uniqueID;
  document.getElementById("buyerDisplay").innerText = buyer;
  document.getElementById("sellerDisplay").innerText = seller;
  document.getElementById("assetDisplay").innerText = assetType;
  document.getElementById("amountDisplay").innerText = `${amount.toFixed(2)} USDC`;
  document.getElementById("feeDisplay").innerText = `Fee (1.5%): ${fee.toFixed(2)} | Total: ${total.toFixed(2)} USDC`;

  document.getElementById("summary").style.display = "block";
  document.getElementById("btnMetaMask").style.display = "block";
  document.getElementById("btnPay").style.display = "block";
  document.getElementById("btnPay").disabled = true;
  document.getElementById("status").innerText = "Connect MetaMask to continue";
});

async function connectMetaMask(){
  const status=document.getElementById("status");
  const btn=document.getElementById("btnMetaMask");

  if(!window.ethereum){
    alert("MetaMask not detected");
    status.innerText="❌ MetaMask not detected";
    return;
  }

  try{
    btn.innerText="Connecting...";
    const accounts = await window.ethereum.request({method:"eth_requestAccounts"});
    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();
    document.getElementById("status").innerText = "✅ Wallet connected";
    document.getElementById("btnPay").disabled = false;
    document.getElementById("walletDisplay")?.remove();
    btn.style.display="none";
  }catch(err){
    console.error(err);
    status.innerText="❌ Connection failed";
  }
}

async function sendPayment(){
  const btn=document.getElementById("btnPay");
  const status=document.getElementById("status");
  if(!signer) return alert("Connect wallet first");

  try{
    btn.disabled=true;
    btn.innerText="Waiting for approval...";

    const usdcAbi = ["function transfer(address to,uint256 amount) public returns(bool)"];
    const contract = new ethers.Contract(USDC_ADDRESS, usdcAbi, signer);
    const value = ethers.utils.parseUnits(finalTotalString,6);

    const tx = await contract.transfer(RECEIVER_ADDRESS,value);
    status.innerText="⏳ Processing transaction";
    await tx.wait();

    status.innerText="✅ Payment Successful";
    btn.innerText="Paid ✔";
  }catch(e){
    console.error(e);
    btn.disabled=false;
    btn.innerText="Confirm Escrow Deposit";
    status.innerText="❌ Transaction failed";
  }
}
</script>
</body>
</html>
