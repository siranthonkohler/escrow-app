```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escrow Transaction</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#020617;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
font-family:'Inter',sans-serif;
}

#escrowWidget{
max-width:480px;
width:100%;
background:#0f172a;
color:white;
padding:30px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
border:1px solid #1e293b;
}

h2{ text-align:center;margin-bottom:20px;}

label{display:block;margin-top:12px;color:#cbd5e1;font-size:14px;}

input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:white;
box-sizing:border-box;
}

.summary{
margin-top:18px;
background:#1e293b;
padding:14px;
border-radius:12px;
border:1px solid #334155;
font-size:14px;
}

.summary p{
display:flex;
justify-content:space-between;
margin:8px 0;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-weight:600;
font-size:16px;
cursor:pointer;
}

.connectBtn{background:#6366f1;color:white;}
.payBtn{background:#22c55e;color:white;}

.payBtn:disabled{
background:#1e293b;
color:#475569;
border:1px solid #334155;
cursor:not-allowed;
}

#status{
margin-top:14px;
text-align:center;
font-size:13px;
color:#38bdf8;
}

</style>

</head>

<body>

<div id="escrowWidget">

<h2>Escrow Transaction</h2>

<form id="escrowForm">

<label>Buyer Name</label>
<input id="buyer" required>

<label>Seller Name</label>
<input id="seller" required>

<label>Email</label>
<input id="email" type="email" required>

<label>Asset Description</label>
<input id="asset">

<label>Deposit Amount (USDC)</label>
<input id="amount" type="number" step="0.01" required>

<button type="button" class="connectBtn" onclick="prepareDeal()">
Initiate Escrow
</button>

</form>


<div class="summary">

<p><span>Deal ID</span><strong id="dealID">-</strong></p>
<p><span>Buyer</span><span id="sumBuyer">-</span></p>
<p><span>Seller</span><span id="sumSeller">-</span></p>
<p><span>Asset</span><span id="sumAsset">-</span></p>

<hr style="border:0;border-top:1px solid #334155;margin:12px 0;">

<p>
<span>Total</span>
<span style="color:#22c55e;font-weight:bold;">
<span id="sumAmount">0.00</span> USDC
</span>
</p>

<p style="font-size:12px;color:#94a3b8;">
Includes 1.5% fee
</p>

<p style="font-size:11px;color:#94a3b8;">
Wallet: <span id="walletDisplay">Not connected</span>
</p>

</div>


<button id="btnConnect" class="connectBtn" onclick="connectWallet()">
Connect Wallet
</button>

<button id="btnDeposit" class="payBtn" onclick="sendPayment()" disabled>
Confirm Escrow Deposit
</button>

<div id="status">
Fill the form to start escrow
</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>

console.log("DEBUG: widget loaded");

let provider;
let signer;

let finalAmount="0";

const USDC_ADDRESS="0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48";
const RECEIVER_ADDRESS="0xAEff38fd17B4bA0e5FC40115441C348aa789E706";



function prepareDeal(){

console.log("DEBUG: prepareDeal clicked");

const buyer=document.getElementById("buyer").value;
const seller=document.getElementById("seller").value;
const asset=document.getElementById("asset").value;
const amount=parseFloat(document.getElementById("amount").value);

console.log("DEBUG: form values",buyer,seller,asset,amount);

if(!buyer||!seller||!amount){

alert("Please fill required fields");
return;

}

const fee=amount*0.015;
const total=amount+fee;

finalAmount=total.toFixed(6);

const deal="MRD-"+Math.floor(Date.now()/1000);

document.getElementById("dealID").innerText=deal;
document.getElementById("sumBuyer").innerText=buyer;
document.getElementById("sumSeller").innerText=seller;
document.getElementById("sumAsset").innerText=asset;
document.getElementById("sumAmount").innerText=total.toFixed(2);

document.getElementById("btnDeposit").disabled=true;

console.log("DEBUG: deal prepared",deal,finalAmount);

}



async function connectWallet(){

console.log("DEBUG: connectWallet clicked");

if(!window.ethereum){

alert("MetaMask not installed");
return;

}

try{

provider=new ethers.providers.Web3Provider(window.ethereum);

console.log("DEBUG: provider created");

await provider.send("eth_requestAccounts",[]);

signer=provider.getSigner();

const address=await signer.getAddress();

console.log("DEBUG: signer address",address);

document.getElementById("walletDisplay").innerText=address;

const network=await provider.getNetwork();

console.log("DEBUG: chainId",network.chainId);

if(network.chainId!==1){

console.log("DEBUG: requesting network switch");

await window.ethereum.request({
method:"wallet_switchEthereumChain",
params:[{chainId:"0x1"}]
});

provider=new ethers.providers.Web3Provider(window.ethereum);
signer=provider.getSigner();

}

document.getElementById("btnDeposit").disabled=false;

document.getElementById("status").innerText="Wallet connected";

}catch(err){

console.error("DEBUG ERROR:",err);

}

}



async function sendPayment(){

console.log("DEBUG: sendPayment called");

const btn=document.getElementById("btnDeposit");

if(!signer){

alert("Connect wallet first");
return;

}

try{

btn.disabled=true;

const abi=[
"function transfer(address to,uint256 amount) public returns(bool)"
];

const contract=new ethers.Contract(
USDC_ADDRESS,
abi,
signer
);

console.log("DEBUG: sending amount",finalAmount);

const value=ethers.utils.parseUnits(finalAmount,6);

const tx=await contract.transfer(RECEIVER_ADDRESS,value);

console.log("DEBUG: tx submitted",tx.hash);

await tx.wait();

console.log("DEBUG: tx confirmed");

document.getElementById("status").innerText="Escrow deposit successful";

}catch(err){

console.error("DEBUG TX ERROR:",err);

}

}

</script>

</body>
</html>
```
